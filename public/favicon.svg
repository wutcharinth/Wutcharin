<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep background radial glow -->
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <!-- Brand W gradient: violet → indigo → cyan -->
    <linearGradient id="wGrad" x1="88" y1="138" x2="424" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="0.48" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Diffuse outer glow -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22" result="blur"/>
    </filter>
    <!-- Tight inner glow for depth -->
    <filter id="innerGlow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="512" height="512" rx="110" fill="#07091a"/>

  <!-- Subtle atmospheric haze -->
  <rect width="512" height="512" rx="110" fill="url(#bgGlow)"/>

  <!-- Outer halo — widest glow, very transparent -->
  <path d="M88 138L178 374L256 204L334 374L424 138"
        stroke="url(#wGrad)" stroke-width="72"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#outerGlow)" opacity="0.38"/>

  <!-- Mid glow layer -->
  <path d="M88 138L178 374L256 204L334 374L424 138"
        stroke="url(#wGrad)" stroke-width="52"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#innerGlow)" opacity="0.55"/>

  <!-- Crisp W lettermark on top -->
  <path d="M88 138L178 374L256 204L334 374L424 138"
        stroke="url(#wGrad)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
